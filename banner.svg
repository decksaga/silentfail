<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <!-- Scanlines pattern (no filter, GitHub-safe) -->
    <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(0,0,0,0.1)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
    </linearGradient>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="url(#scanline)"/>
    </pattern>
    <!-- Top line gradient -->
    <linearGradient id="topline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="12%" stop-color="#f87171"/>
      <stop offset="40%" stop-color="#f87171"/>
      <stop offset="42%" stop-color="transparent"/>
      <stop offset="58%" stop-color="transparent"/>
      <stop offset="60%" stop-color="#f87171"/>
      <stop offset="88%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <!-- Danger glow (radial, center) -->
    <radialGradient id="dangerglow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#f87171" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow behind FAIL text -->
    <radialGradient id="failglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f87171" stop-opacity="0"/>
    </radialGradient>
    <!-- Tear line gradient -->
    <linearGradient id="teargrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="15%" stop-color="#f87171" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#f87171" stop-opacity="0.5"/>
      <stop offset="85%" stop-color="#f87171" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#06070a"/>

  <!-- Danger ambient glow -->
  <rect width="1200" height="300" fill="url(#dangerglow)"/>

  <!-- Corrupt data blocks -->
  <rect x="80" y="42" width="180" height="7" fill="#f87171" opacity="0.07"/>
  <rect x="80" y="42" width="2" height="7" fill="#f87171" opacity="0.2"/>
  <rect x="900" y="235" width="130" height="5" fill="#f87171" opacity="0.07"/>
  <rect x="900" y="235" width="2" height="5" fill="#f87171" opacity="0.2"/>
  <rect x="940" y="178" width="95" height="6" fill="#f87171" opacity="0.07"/>
  <rect x="940" y="178" width="2" height="6" fill="#f87171" opacity="0.2"/>
  <rect x="300" y="250" width="200" height="4" fill="#f87171" opacity="0.07"/>
  <rect x="300" y="250" width="2" height="4" fill="#f87171" opacity="0.2"/>
  <!-- Extra corrupt blocks for density -->
  <rect x="650" y="58" width="110" height="4" fill="#f87171" opacity="0.05"/>
  <rect x="650" y="58" width="2" height="4" fill="#f87171" opacity="0.15"/>
  <rect x="150" y="220" width="70" height="5" fill="#f87171" opacity="0.05"/>
  <rect x="150" y="220" width="2" height="5" fill="#f87171" opacity="0.15"/>

  <!-- Ghost hex data (slightly more visible) -->
  <text x="40" y="30" font-family="'Courier New', monospace" font-size="9" fill="#f87171" opacity="0.1" letter-spacing="2">0x4641 494C 0000 DEAD BEEF 0x00 ERR_SILENT</text>
  <text x="790" y="268" font-family="'Courier New', monospace" font-size="9" fill="#f87171" opacity="0.1" letter-spacing="2">TIMEOUT::NULL_RESPONSE::CONN_LOST</text>
  <text x="690" y="285" font-family="'Courier New', monospace" font-size="9" fill="#f87171" opacity="0.1" letter-spacing="2">PID 0 SIGTERM EXIT_CODE -1</text>
  <text x="880" y="52" font-family="'Courier New', monospace" font-size="9" fill="#f87171" opacity="0.1" letter-spacing="2">MCP::HANDSHAKE_FAIL</text>
  <!-- Extra ghost data -->
  <text x="40" y="285" font-family="'Courier New', monospace" font-size="9" fill="#f87171" opacity="0.06" letter-spacing="2">0xFFFF STACK_OVERFLOW HEAP_CORRUPT 0x00</text>
  <text x="400" y="52" font-family="'Courier New', monospace" font-size="9" fill="#f87171" opacity="0.06" letter-spacing="2">SCHEMA::PARSE_ERR::NULL_PTR</text>

  <!-- Error tags on sides (vertical) -->
  <text x="28" y="185" font-family="'Courier New', monospace" font-size="10" fill="#f87171" opacity="0.18" letter-spacing="1" transform="rotate(-90, 28, 160)">ERR_MCP_TIMEOUT</text>
  <text x="1172" y="185" font-family="'Courier New', monospace" font-size="10" fill="#f87171" opacity="0.18" letter-spacing="1" transform="rotate(90, 1172, 160)">EXIT_CODE -1</text>

  <!-- ═══ GLITCH EFFECT (no filters needed) ═══ -->

  <!-- Glow ellipse behind FAIL portion -->
  <ellipse cx="730" cy="148" rx="200" ry="60" fill="url(#failglow)"/>

  <!-- Glitch clone RED — offset left & up, clipped to top half -->
  <g opacity="0.2">
    <clipPath id="clip-top">
      <rect x="0" y="0" width="1200" height="148"/>
    </clipPath>
    <text x="327" y="168" font-family="'Courier New', monospace" font-size="90" font-weight="900" letter-spacing="11" fill="#f87171" clip-path="url(#clip-top)">SILENTFAIL</text>
  </g>

  <!-- Glitch clone BLUE — offset right & down, clipped to bottom half -->
  <g opacity="0.12">
    <clipPath id="clip-bot">
      <rect x="0" y="148" width="1200" height="152"/>
    </clipPath>
    <text x="337" y="168" font-family="'Courier New', monospace" font-size="90" font-weight="900" letter-spacing="11" fill="#60a5fa" clip-path="url(#clip-bot)">SILENTFAIL</text>
  </g>

  <!-- Main title: SILENT (white) -->
  <text x="332" y="168" font-family="'Courier New', monospace" font-size="90" font-weight="900" letter-spacing="11" fill="#ffffff">SILENT</text>

  <!-- Main title: FAIL (red with glow simulation) -->
  <!-- Glow layer 1 (wide, faint) -->
  <text x="722" y="168" font-family="'Courier New', monospace" font-size="90" font-weight="900" letter-spacing="11" fill="#f87171" opacity="0.15">FAIL</text>
  <!-- Glow layer 2 (slight offset) -->
  <text x="723" y="169" font-family="'Courier New', monospace" font-size="90" font-weight="900" letter-spacing="11" fill="#f87171" opacity="0.1">FAIL</text>
  <!-- Main FAIL -->
  <text x="722" y="168" font-family="'Courier New', monospace" font-size="90" font-weight="900" letter-spacing="11" fill="#f87171">FAIL</text>

  <!-- Horizontal tear line -->
  <line x1="260" y1="148" x2="940" y2="148" stroke="url(#teargrad)" stroke-width="1"/>
  <!-- Secondary tear fragments -->
  <line x1="300" y1="146" x2="500" y2="146" stroke="#f87171" stroke-width="0.5" opacity="0.15"/>
  <line x1="700" y1="150" x2="880" y2="150" stroke="#f87171" stroke-width="0.5" opacity="0.1"/>

  <!-- Subtitle -->
  <text x="600" y="205" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="14" font-weight="300" fill="rgba(255,255,255,0.35)" letter-spacing="3" text-anchor="middle">
    <tspan>your mcp servers are failing.</tspan>
    <tspan fill="#f87171" opacity="0.55"> you just don't know it yet.</tspan>
  </text>

  <!-- Cursor blink -->
  <rect x="783" y="193" width="2" height="14" fill="#f87171" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Status bar bottom -->
  <circle cx="42" cy="280" r="3.5" fill="#f87171" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="52" y="283" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.12)" letter-spacing="1">SCANNING 5 SERVERS...</text>
  <text x="1040" y="283" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.12)" letter-spacing="1">github.com/decksaga/silentfail</text>

  <!-- Top red line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#topline)" opacity="0.8"/>

  <!-- Scanlines overlay -->
  <rect width="1200" height="300" fill="url(#scanlines)" opacity="0.4"/>
</svg>
